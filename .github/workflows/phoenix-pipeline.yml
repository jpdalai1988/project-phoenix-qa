name: Project Phoenix - QA Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger

env:
  BASE_URL: ${{ secrets.BASE_URL || 'https://the-internet.herokuapp.com' }}
  TEST_USERNAME: ${{ secrets.TEST_USERNAME || 'tomsmith' }}
  TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'SuperSecretPassword!' }}

jobs:
  api-tests:
    name: API Layer Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run API tests
        run: npm run test:api
        continue-on-error: false
      
      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
      
      - name: Set API test status
        id: api-status
        run: echo "status=success" >> $GITHUB_OUTPUT
        if: success()
    
    outputs:
      api-status: ${{ steps.api-status.outputs.status }}

  ui-tests:
    name: UI Tests with Self-Healing
    needs: [api-tests]
    if: needs.api-tests.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}
      
      - name: Create test data directory
        run: mkdir -p src/test-data
      
      - name: Create sample test file
        run: echo "Sample test content" > src/test-data/sample.pdf
      
      - name: Run UI tests on ${{ matrix.browser }}
        run: npm run test:ui
        env:
          BROWSER: ${{ matrix.browser }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      
      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results-${{ matrix.browser }}
          path: |
            test-results/
            playwright-report/
            test-artifacts/
          retention-days: 7
      
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 7

  generate-report:
    name: Generate Test Report
    needs: [api-tests, ui-tests]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Allure
        run: |
          npm install -g allure-commandline
      
      - name: Generate Allure Report
        run: |
          # Combine all allure results
          mkdir -p all-results
          find artifacts -name "allure-results-*" -type d -exec cp -r {}/* all-results/ 2>/dev/null \;
          allure generate all-results --clean -o allure-report
        continue-on-error: true
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: test-reports
      
      - name: Create Summary Report
        run: |
          echo "# Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "## API Tests: ${{ needs.api-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "## UI Tests: ${{ needs.ui-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "Report available at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/test-reports/" >> $GITHUB_STEP_SUMMARY
      
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.setFailed('Tests failed! Check the test reports for details.')

  security-scan:
    name: Security Scan
    needs: [ui-tests]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate
      
      - name: Run secret scanning
        run: |
          if grep -r "SECRET\|KEY\|TOKEN" --exclude-dir={node_modules,.git} .; then
            echo "⚠️ Potential secrets found in code!"
          fi