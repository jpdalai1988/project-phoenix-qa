name: Project Phoenix - QA Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BASE_URL: https://the-internet.herokuapp.com
  TEST_USERNAME: tomsmith
  TEST_PASSWORD: SuperSecretPassword!

jobs:
  # Job 1: API Tests (Fast feedback - runs first)
  api-tests:
    name: API Layer Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run API tests
        run: npx playwright test src/tests/api/ --project=chromium
        continue-on-error: false
      
      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
      
      - name: Set API test status
        id: api-status
        run: echo "status=success" >> $GITHUB_OUTPUT
        if: success()
    
    outputs:
      api-status: ${{ steps.api-status.outputs.status }}

  # Job 2: UI Tests (Runs only if API tests pass)
  ui-tests:
    name: UI Tests
    needs: [api-tests]
    if: needs.api-tests.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}
      
      - name: Create test data directory
        run: mkdir -p src/test-data
      
      - name: Create sample test file
        run: echo "Sample KYC Document" > src/test-data/sample.pdf
      
      - name: Run UI tests on ${{ matrix.browser }}
        run: npx playwright test src/tests/ui/ --project=${{ matrix.browser }}
      
      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results-${{ matrix.browser }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # Job 3: Summary Report
  summary-report:
    name: Test Summary Report
    needs: [api-tests, ui-tests]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Create Summary Report
        run: |
          echo "# Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- **API Tests**: ${{ needs.api-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **UI Tests**: ${{ needs.ui-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📁 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- [Download API Results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
      
      - name: Notify on failure
        if: failure() || needs.api-tests.result == 'failure' || needs.ui-tests.result == 'failure'
        run: |
          echo "❌ Tests failed! Check the test reports for details."
          exit 0